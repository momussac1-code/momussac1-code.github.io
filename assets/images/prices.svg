<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#132244"/>
  <g transform="translate(200,60)">
    <text x="200" y="50" font-family="Arial,sans-serif" font-size="28" fill="#e8c46a" font-weight="700" text-anchor="middle">Locksmith Prices UK 2026</text>
    <text x="200" y="80" font-family="Arial,sans-serif" font-size="14" fill="#adb5bd" text-anchor="middle">What you should expect to pay</text>
    <rect x="50" y="120" width="120" height="60" rx="8" fill="none" stroke="#d4a843" stroke-width="2"/>
    <text x="110" y="145" font-family="Arial,sans-serif" font-size="14" fill="#e8c46a" font-weight="600" text-anchor="middle">Call-out Fee</text>
    <text x="110" y="168" font-family="Arial,sans-serif" font-size="20" fill="#e8c46a" font-weight="700" text-anchor="middle">£45-£120</text>
    <rect x="240" y="120" width="120" height="60" rx="8" fill="none" stroke="#d4a843" stroke-width="2"/>
    <text x="300" y="145" font-family="Arial,sans-serif" font-size="14" fill="#e8c46a" font-weight="600" text-anchor="middle">Lock Change</text>
    <text x="300" y="168" font-family="Arial,sans-serif" font-size="20" fill="#e8c46a" font-weight="700" text-anchor="middle">£60-£150</text>
  </g>
</svg>